<!DOCTYPE html>
<html>

<head>
<title>CyberShield Security Platform</title>

<style>

body{
background:#0b0f14;
color:white;
font-family:Arial;
margin:0;
}

/* Navigation Bar */

.navbar{
background:#111827;
padding:15px;
display:flex;
gap:20px;
}

.navbar a{
color:white;
text-decoration:none;
font-weight:bold;
}

.navbar a:hover{
color:#00ffcc;
}

/* Dashboard Container */

.container{
padding:20px;
}

.cards{
display:flex;
gap:20px;
margin-bottom:20px;
}

.card{
background:#1f2937;
padding:20px;
border-radius:8px;
width:200px;
text-align:center;
}

.log{
background:#1f2937;
padding:10px;
margin:5px;
border-left:4px solid cyan;
}

</style>

</head>

<body>

<!-- Navigation -->

<div class="navbar">

<a href="/">Dashboard</a>
<a href="/email">Email Analyzer</a>
<a href="/url">URL Scanner</a>
<a href="/ai-email">AI Phishing Detector</a>
<a href="/file-scan">File Scanner</a>
</div>

<div class="container">

<h1>CyberShield Security Dashboard</h1>

<div class="cards">

<div class="card">
<h3>Total Uploads</h3>
<p>{{uploads}}</p>
</div>

<div class="card">
<h3>Security Alerts</h3>
<p>{{alerts}}</p>
</div>

<div class="card">
<h3>Malware Files</h3>
<p>{{malware}}</p>
</div>

</div>

<h2>Recent Security Activity</h2>

{% for log in logs %}

<div class="log">{{log}}</div>

{% endfor %}

</div>

</body>
</html>
